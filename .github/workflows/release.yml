name: Release

permissions: {}

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    name: Release
    uses: grafana/xk6/.github/workflows/extension-release.yml@b0381793f1c874bdc03fd8e75a4725a36fc20e48 # v1.4.0
    permissions:
      contents: write
    with:
      go-version: "1.26.x"
      os: '["linux", "windows", "darwin"]'
      arch: '["amd64", "arm64"]'
      k6-version: "v1.7.1"
      xk6-version: "1.3.7"
      private: true
