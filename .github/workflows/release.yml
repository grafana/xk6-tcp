name: Release

permissions: {}

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    name: Release
    uses: grafana/xk6/.github/workflows/extension-release.yml@0b7fdcb9263312b71deb117994309858119f020d # v1.3.7
    permissions:
      contents: write
    with:
      go-version: "1.26.x"
      os: '["linux", "windows", "darwin"]'
      arch: '["amd64", "arm64"]'
      k6-version: "v1.7.1"
      xk6-version: "1.3.7"
      private: true
